    <title>DevForge | Privacy-First Developer Tools</title>

    <link rel="icon" type="image/png" href="assets/icons/DF-icon.png" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #050816;
            color: #f5f5f5;
            font-family: Inter, Arial, sans-serif;
            line-height: 1.6;
        }

        a {
            text-decoration: none;
        }

        .container {
            width: 92%;
            max-width: 1300px;
            margin: auto;
        }

        /* Navbar */

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            position: sticky;
            top: 0;
            background: rgba(5, 8, 22, 0.92);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand img {
            width: 42px;
            height: 42px;
            border-radius: 10px;
        }

        .brand h1 {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 26px;
        }

        .nav-links a {
            color: #d7d7d7;
            transition: 0.3s ease;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            color: #7dd3fc;
        }
